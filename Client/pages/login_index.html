<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MiniFlyton Login</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; max-width: 420px; }
    input, button { width: 100%; padding: 10px; margin: 6px 0; }
    .msg { margin-top: 12px; color: #b00020; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>
    <input id="username" value="admin" />
    <input id="password" type="password" value="fly123" />
    <button onclick="goLogin()">Login</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
async function goLogin() {
  const res = await fetch('/cgi-bin/api?meth=api_login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    })
  });
  const data = await res.json();
  if (data.server && data.server.allow === 1 && data.go) {
    location.href = data.go;
  } else {
    document.getElementById('msg').innerText = (data.server && data.server.msg) || 'Login failed';
  }
}
</script>
</body>
</html>
